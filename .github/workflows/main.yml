name: toSilverDeploy
on: [push]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Trigger webhook
              env:
                  WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
              run: |
                  if [ -n "$WEBHOOK_URL" ]; then
                      curl -X GET "${WEBHOOK_URL}" || echo "Webhook trigger failed"
                  else
                      echo "WEBHOOK_URL secret not set, skipping webhook trigger"
                  fi  
              continue-on-error: true